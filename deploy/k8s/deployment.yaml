apiVersion: apps/v1
kind: Deployment
metadata:
  name: nothingdns
  namespace: default
  labels:
    app: nothingdns
    version: v0.1.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nothingdns
  template:
    metadata:
      labels:
        app: nothingdns
        version: v0.1.0
    spec:
      # Never leak a cluster token into the container filesystem. Using the
      # namespace's default SA — create a dedicated SA if RBAC is layered on.
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: nothingdns
        image: nothingdns/nothingdns:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: dns-udp
          containerPort: 53
          protocol: UDP
        - name: dns-tcp
          containerPort: 53
          protocol: TCP
        - name: http
          containerPort: 8080
        - name: https
          containerPort: 853
        - name: metrics
          containerPort: 9153
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 2000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
        volumeMounts:
        - name: config
          mountPath: /etc/nothingdns
          readOnly: true
        - name: zones
          mountPath: /etc/nothingdns/zones
          readOnly: true
        - name: tls
          mountPath: /etc/nothingdns/tls
          readOnly: true
        args:
        - --config
        - /etc/nothingdns/config.yaml
        securityContext:
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
            add:
              - NET_BIND_SERVICE  # only for binding port 53
      volumes:
      - name: config
        configMap:
          name: nothingdns-config
      - name: zones
        persistentVolumeClaim:
          claimName: nothingdns-zones
      - name: tls
        secret:
          secretName: nothingdns-tls
