apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nothingdns
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
  - host: dns.example.com
    http:
      paths:
      - path: /dns-query
        pathType: Prefix
        backend:
          service:
            name: nothingdns
            port:
              number: 8080
  - host: dns.example.com
    http:
      paths:
      - path: /metrics
        pathType: Prefix
        backend:
          service:
            name: nothingdns
            port:
              number: 9153
