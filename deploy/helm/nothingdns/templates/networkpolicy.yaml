{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "nothingdns.fullname" . }}
  labels:
    {{- include "nothingdns.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "nothingdns.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # DNS UDP/TCP
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
      {{- with .Values.networkPolicy.ingressRules }}
      {{- range . }}
      from:
        {{- toYaml .from | nindent 8 }}
      {{- end }}
      {{- else }}
      from: []
      {{- end }}
    # DoT
    {{- if .Values.config.xot.enabled }}
    - ports:
        - protocol: TCP
          port: 853
      from: []
    {{- end }}
    # API/Metrics
    - ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9090
      from: []
  egress:
    # Allow all outbound for upstream DNS queries
    - {}
{{- end }}
